<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Whatsapp Logger</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/postmonger/postmonger.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            color: #333;
            background: #fff;
            font-size: 13px;
        }
        h3 {
            color: #2e7d32;
            margin-bottom: 16px;
            font-size: 15px;
            text-align: center;
        }
        .field { margin-bottom: 12px; }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 4px;
            color: #444;
            font-size: 12px;
        }
        input {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
            color: #333;
            background: #fff;
        }
        .hint { font-size: 11px; color: #888; margin-top: 3px; }
        .badge {
            background: #e8f5e9;
            border: 1px solid #a5d6a7;
            border-radius: 12px;
            padding: 3px 10px;
            font-size: 11px;
            color: #2e7d32;
            margin-left: 6px;
        }
        .de-key-display {
            font-size: 11px;
            color: #1565c0;
            background: #e3f2fd;
            border: 1px solid #90caf9;
            border-radius: 4px;
            padding: 4px 8px;
            margin-bottom: 14px;
            word-break: break-all;
        }
        .de-key-display span { font-weight: bold; }
    </style>
</head>
<body>

<h3>📱 Whatsapp Logger <span class="badge">Active</span></h3>

<div class="de-key-display" id="deKeyDisplay" style="display:none;">
    <span>Entry DE Key:</span> <span id="deKeyValue"></span>
</div>

<div class="field">
    <label>Mobile Number Token</label>
    <input type="text" id="mobileNumber" readonly />
    <div class="hint">Auto-mapped from Entry DE</div>
</div>

<div class="field">
    <label>Lead ID Token</label>
    <input type="text" id="leadId" readonly />
    <div class="hint">Auto-mapped from Entry DE</div>
</div>

<div class="field">
    <label>Application ID Token</label>
    <input type="text" id="applicationId" readonly />
    <div class="hint">Auto-mapped from Entry DE</div>
</div>

<script>

    var connection = new Postmonger.Session();
    var payload    = {};
    var entryDeKey = '';   // resolved dynamically from JB — never hardcoded

    // ── boot ──────────────────────────────────────────────────
    $(window).ready(function () {
        connection.on('initActivity', onInitActivity);
        connection.on('clickedNext',  onSave);
        // requestSchema works for DE / Salesforce Data entry sources
        connection.on('requestedSchema', onSchemaReceived);
        connection.trigger('ready');
    });

    // ── Step 1: JB sends activity payload ────────────────────
    function onInitActivity(data) {

        if (data) { payload = data; }

        var savedArgs = extractArgs(payload);

        if (savedArgs.mobileNumber && savedArgs.mobileNumber !== '') {

            // Returning to a saved activity — restore persisted tokens
            $('#mobileNumber').val(savedArgs.mobileNumber);
            $('#leadId').val(savedArgs.leadId || '');
            $('#applicationId').val(savedArgs.applicationId || '');
            $('#deKeyValue').text('Restored from saved configuration');
            $('#deKeyDisplay').show();

        } else {

            // Fresh drop — ask JB for the entry event schema
            connection.trigger('requestSchema');
        }
    }

    // ── Step 2: derive the entry DE key from the schema ───────
    function onSchemaReceived(data) {
        try {
            var schema = (data && data.schema) ? data.schema : [];
            for (var i = 0; i < schema.length; i++) {
                var k = schema[i].key || '';
                if (k.indexOf('Event.') === 0 && k.lastIndexOf('.') > 6) {
                    // key looks like Event.<entryKey>.<Field> — pull <entryKey>
                    entryDeKey = k.substring(6, k.lastIndexOf('.'));
                    if (entryDeKey !== '') {
                        applyTokens(entryDeKey);
                        return;
                    }
                }
            }
        } catch(e) {}
        enableManualInput();
    }

    // ── Build tokens from the detected DE key ─────────────────
    function applyTokens(deKey) {
        $('#mobileNumber').val('{{Event.' + deKey + '.MobileNumber}}');
        $('#leadId').val('{{Event.' + deKey + '.LeadId}}');
        $('#applicationId').val('{{Event.' + deKey + '.ApplicationId}}');
        $('#deKeyValue').text(deKey);
        $('#deKeyDisplay').show();
    }

    // ── Fallback: let the marketer type tokens manually ───────
    function enableManualInput() {
        $('#mobileNumber').removeAttr('readonly')
            .attr('placeholder', 'e.g. {{Event.YOUR-DE-KEY.MobileNumber}}');
        $('#leadId').removeAttr('readonly')
            .attr('placeholder', 'e.g. {{Event.YOUR-DE-KEY.LeadId}}');
        $('#applicationId').removeAttr('readonly')
            .attr('placeholder', 'e.g. {{Event.YOUR-DE-KEY.ApplicationId}}');

        $('#deKeyDisplay').css('background','#fff3e0')
            .css('border-color','#ffb74d').show();
        $('#deKeyValue').text('Could not detect — please type tokens manually');
    }

    // ── Save: marketer clicks Done ────────────────────────────
    function onSave() {

        var mobile = $('#mobileNumber').val();
        var lead   = $('#leadId').val();
        var app    = $('#applicationId').val();

        // No hardcoded DE: refuse to save unless a real Event token is present
        if (!mobile || mobile.indexOf('{{Event.') !== 0) {
            alert('Entry DE not detected. Enter the {{Event.<DE-KEY>.Field}} tokens before saving.');
            return;
        }

        payload.metaData.isConfigured = true;
        payload.arguments.execute.inArguments = [
            { "subscriberKey":  "{{Contact.Key}}" },
            { "mobileNumber":   mobile },
            { "leadId":         lead },
            { "applicationId":  app }
        ];

        connection.trigger('updateActivity', payload);
    }

    // ── Helper: read saved args back out of the payload ───────
    function extractArgs(pl) {
        var args = {};
        try {
            if (pl.arguments && pl.arguments.execute && pl.arguments.execute.inArguments) {
                pl.arguments.execute.inArguments.forEach(function(obj) {
                    var key = Object.keys(obj)[0];
                    args[key] = obj[key];
                });
            }
        } catch(e) {}
        return args;
    }

</script>
</body>
</html>
